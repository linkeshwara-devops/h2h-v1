name: Deploy H2H

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: docker build -t linkeshwara/h2h-v1:latest .

      - name: Push Image
        run: docker push linkeshwara/h2h-v1:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull linkeshwara/h2h-v1:latest

            docker stop h2h-app || true
            docker rm h2h-app || true

            docker run -d \
              --name h2h-app \
              -p 5000:5000 \
              linkeshwara/h2h-v1:latest
