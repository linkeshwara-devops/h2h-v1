name: Deploy H2H

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ h2h_v1_secretkey.DOCKER_USERNAME }}
          password: ${{ h2h_v1_secretkey.DOCKER_PASSWORD }}

      - name: Build Image
        run: docker build -t linkeshwara/h2h-v1:latest .

      - name: Push Image
        run: docker push linkeshwara/h2h-v1:latest
